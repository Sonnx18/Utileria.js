<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="contenedor">
        <h1>Formulario de Registro</h1>
        <p>Formulario de prueba para la librería <strong>utileria.js</strong>: valida nombre, correo, teléfono, CURP, fecha de nacimiento y contraseña.</p>

        <form id="formRegistro" onsubmit="return manejarSubmit(event)">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" placeholder="Ejemplo: Noel López" required>
            <p class="error" id="errorNombre"></p>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" placeholder="Ejemplo: noel@correo.com" required>
            <p class="error" id="errorCorreo"></p>

            <label for="telefono">Teléfono (10 dígitos):</label>
            <input type="text" id="telefono" placeholder="Ejemplo: 951 123 4567" maxlength="10" required>
            <p class="error" id="errorTelefono"></p>

            <label for="curp">CURP:</label>
            <input type="text" id="curp" placeholder="Ejemplo: LOHN040617HOCPRLA1" maxlength="18" required>
            <p class="error" id="errorCurp"></p>

            <label for="fechaNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechaNacimiento" required>
            <p class="error" id="errorFecha"></p>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Mín. 8 caracteres" required>
            <p class="error" id="errorPassword"></p>

            <button type="submit">Registrar</button>
        </form>

        <a class="link-secundario" href="login.html">¿Ya tienes cuenta? Inicia sesión</a>

        <p style="text-align:center; font-size: 10px; color: #727272;">Noel López Herrera - 22161124</p>
    </div>

    <!-- Modal que muestra la edad calculada -->
    <div class="overlay" id="modalEdad">
        <div class="modal">
            <h2>¡Registro exitoso!</h2>
            <p style="text-align:center;">Tu edad calculada es:</p>
            <div class="edad-numero" id="edadCalculada">--</div>
            <div class="estado" id="estadoEdad"></div>
            <button onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="js/utileria.js"></script>
</body>
</html>
