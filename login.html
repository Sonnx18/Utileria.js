<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utileria.js - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="contenedor">
        <h1>Iniciar sesión</h1>
        <p>Este login usa <strong>validarCorreo()</strong> y <strong>validarPassword()</strong> de la librería utileria.js para validar los campos antes de enviar.</p>

        <form id="formLogin" onsubmit="return manejarLogin(event)">
            <label for="correoLogin">Correo electrónico:</label>
            <input type="email" id="correoLogin" placeholder="Ejemplo: noel@correo.com" required>
            <p class="error" id="errorCorreoLogin"></p>

            <label for="passwordLogin">Contraseña:</label>
            <input type="password" id="passwordLogin" placeholder="Mín. 8 caracteres" required>
            <p class="error" id="errorPasswordLogin"></p>

            <button type="submit">Entrar</button>
        </form>

        <a class="link-secundario" href="index.html">¿No tienes cuenta? Regístrate</a>

    </div>

    <script src="js/utileria.js"></script>
</body>
</html>
